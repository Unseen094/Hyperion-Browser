<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hyperion DevTools</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #ccc; display: flex; flex-direction: column; height: 100vh; }
        .tabs { display: flex; background: #252526; border-bottom: 1px solid #333; }
        .tab { padding: 8px 16px; cursor: pointer; border-right: 1px solid #333; user-select: none; }
        .tab.active { background: #1e1e1e; color: #fff; border-bottom: 2px solid #007acc; }
        .panel { flex: 1; overflow: auto; padding: 10px; display: none; }
        .panel.active { display: block; }
        
        /* Console Styles */
        .console-input { position: fixed; bottom: 0; left: 0; right: 0; background: #1e1e1e; border-top: 1px solid #333; padding: 10px; display: flex; }
        .console-input input { flex: 1; background: #2d2d2d; border: 1px solid #3e3e42; color: #fff; padding: 6px; border-radius: 3px; }
        .log-entry { margin: 4px 0; font-family: Consolas, monospace; font-size: 13px; }
        .log-entry.info { color: #ccc; }
        .log-entry.error { color: #f48771; }
        .log-entry.warn { color: #cca700; }
        
        /* Elements Tree */
        .dom-tree { font-family: Consolas, monospace; font-size: 13px; }
        .dom-tag { color: #569cd6; }
        .dom-attr { color: #9cdcfe; }
        .dom-text { color: #ce9178; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" data-panel="console">Console</div>
        <div class="tab" data-panel="elements">Elements</div>
        <div class="tab" data-panel="network">Network</div>
    </div>
    
    <div id="console" class="panel active">
        <div id="console-output"></div>
    </div>
    
    <div id="elements" class="panel">
        <div class="dom-tree" id="dom-tree">Loading...</div>
    </div>
    
    <div id="network" class="panel">
        <table style="width:100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align:left; border-bottom:1px solid #333;">
                    <th style="padding:8px;">Status</th>
                    <th>Method</th>
                    <th>URL</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="network-requests"></tbody>
        </table>
    </div>

    <script>
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.panel).classList.add('active');
            });
        });

        // Console
        const consoleOutput = document.getElementById('console-output');
        
        function addLog(type, text) {
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.textContent = `[${type.toUpperCase()}] ${text}`;
            consoleOutput.appendChild(div);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        // Mock data for demonstration (would be replaced by real WebSocket/IPC)
        setTimeout(() => addLog('info', 'DevTools connected to Hyperion Engine'), 100);
        
        // Simulate network request
        setTimeout(() => {
            const tbody = document.getElementById('network-requests');
            const tr = document.createElement('tr');
            tr.innerHTML = '<td style="padding:8px; color:#4ec9b0;">200</td><td>GET</td><td>https://example.com</td><td>45ms</td>';
            tbody.appendChild(tr);
        }, 2000);
    </script>
</body>
</html>
